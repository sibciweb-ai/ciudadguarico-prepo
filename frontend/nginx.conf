server {
  listen 80;
  server_name _;

  # Aumentar límite de tamaño del cuerpo de las peticiones para permitir subidas de noticias con múltiples imágenes
  client_max_body_size 50M;

  # Serve frontend
  root   /usr/share/nginx/html;
  index  index.html;

  # Proxy API to backend service
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    
    # Timeouts para operaciones largas (subida de archivos grandes)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Proxy uploads (archivos subidos) al backend - DEBE IR ANTES que la directiva de archivos estáticos
  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
  }

  # Proxy para el stream de radio Icecast
  location /radio/ {
    proxy_pass http://149.50.138.208:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Headers específicos para streaming
    proxy_buffering off;
    proxy_cache off;
    tcp_nodelay on;
  }

  # Serve static assets with caching - EXCLUYENDO uploads
  location ~* ^(?!/uploads/).*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # History API fallback for SPA
  location / {
    try_files $uri /index.html;
  }
}
