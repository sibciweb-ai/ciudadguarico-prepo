server {
  listen 80;
  server_name _;

  # Aumentar límite de tamaño del cuerpo de las peticiones
  client_max_body_size 50M;

  # ====== GZIP COMPRESSION (Critical for LCP) ======
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff
    font/woff2
    application/font-woff
    application/font-woff2;

  # ====== Security Headers ======
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Serve frontend
  root   /usr/share/nginx/html;
  index  index.html;

  # Proxy API to backend service
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    
    # Timeouts para operaciones largas
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Proxy uploads al backend
  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Cache uploads en el navegador (imágenes no cambian)
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Proxy para el stream de radio Icecast
  location /radio/ {
    proxy_pass http://149.50.138.208:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Headers específicos para streaming
    proxy_buffering off;
    proxy_cache off;
    tcp_nodelay on;
  }

  # ====== Static Assets with Long Cache ======
  # JS/CSS bundles (tienen hash en el nombre, cache inmutable)
  location ~* ^/assets/.*\.(js|css)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # Fuentes (cache largo)
  location ~* \.(woff2?|ttf|eot|otf)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Access-Control-Allow-Origin "*";
    access_log off;
  }

  # Imágenes estáticas (cache moderado)
  location ~* ^(?!/uploads/).*\.(png|jpg|jpeg|gif|webp|svg|ico)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
  }

  # History API fallback for SPA
  location / {
    try_files $uri /index.html;
    
    # index.html nunca se cachea (permite actualizaciones instantáneas)
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}

